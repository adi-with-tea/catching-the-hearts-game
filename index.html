<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Heart Catcher Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Catch the Heartssss💗</h1>
  <div id="mode-buttons">
    <button onclick="startGame(15)">15s</button>
    <button onclick="startGame(30)">30s</button>
    <button onclick="startGame(60)">60s</button>
  </div>
  <div class="timer" id="timer">Time: 0s</div>
  <div class="score" id="score">Score: 0</div>
  <div class="score" id="best-score">Best: 0</div>
  <div id="game">
    <div id="catcher"></div>
    <div id="win-message">Did you just win?!!</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
